name: Create Notion Daily Note

on:
  workflow_dispatch: {}
  schedule:
    - cron: "5 20 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: node scripts/daily.js
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DAILY_DB_ID: ${{ secrets.DAILY_DB_ID }}
          TASKS_DB_ID: ${{ secrets.TASKS_DB_ID }}
          TEMPLATE_PAGE_ID: ${{ secrets.TEMPLATE_PAGE_ID }}